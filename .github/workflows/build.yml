name: Build Executables

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: pareto_hunt.exe
            final_name: pareto_hunt-windows.exe
          - os: macos-latest
            artifact_name: pareto_hunt
            final_name: pareto_hunt-macos
          - os: ubuntu-latest
            artifact_name: pareto_hunt
            final_name: pareto_hunt-linux

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build executable
      run: pyinstaller --onefile --name pareto_hunt hunt.py

    - name: Rename executable
      shell: bash
      run: |
        cd dist
        mv ${{ matrix.artifact_name }} ${{ matrix.final_name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.final_name }}
        path: dist/${{ matrix.final_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v6
      with:
          fetch-depth: 0

    - uses: actions/download-artifact@v8

    - name: Create Release
      run: |
        gh release create ${{ github.ref_name }} \
          pareto_hunt-windows.exe/pareto_hunt-windows.exe \
          pareto_hunt-macos/pareto_hunt-macos \
          pareto_hunt-linux/pareto_hunt-linux
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
